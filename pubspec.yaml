name: confident_cam
description: "A 30-day AI-guided video challenge app to overcome camera anxiety."
publish_to: 'none'
version: 1.1.4+15

environment:
  sdk: ^3.7.0-0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Backend
  supabase_flutter: ^2.3.0
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # Network
  internet_connection_checker: ^1.0.0+1
  
  # Camera & Video
  camera: ^0.10.5+9
  video_player: ^2.8.2
  youtube_player_flutter: ^9.1.3
  path_provider: ^2.1.1
  mobile_scanner: ^5.1.1  # QR code scanning for web login
  
  # UI/UX
  flutter_easyloading: ^3.0.5
  country_code_picker: ^3.0.0
  pinput: ^3.0.1
  lottie: ^2.7.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  logger: ^2.0.2+1
  intl: ^0.18.1
  uuid: ^4.2.1
  dartz: ^0.10.1
  rxdart: ^0.27.7
  
  # Permissions
  permission_handler: ^11.1.0

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  gal: ^2.3.2
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  hive: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/scripts/
